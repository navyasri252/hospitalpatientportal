{% extends 'hospital/base.html' %}

{% block title %}Staff Login - CarePort Hospital{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="glass-card bg-white p-4 p-md-5 mt-4 fade-in">
            <div class="text-center mb-4">
                <div class="rounded-circle bg-primary-light p-3 mx-auto text-primary mb-3 shadow-sm" style="width: 70px; height: 70px; display: flex; align-items: center; justify-content: center;">
                    <i class="bi bi-shield-lock-fill fs-2"></i>
                </div>
                <h3 class="fw-bold text-dark">Staff Portal</h3>
                <p class="text-muted small">Please authenticate to access doctor schedules and manage bookings.</p>
            </div>
            
            <form method="POST" action="{% url 'admin_login' %}">
                {% csrf_token %}
                
                <div class="mb-3">
                    <label for="id_username" class="form-label fw-semibold">Username</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light text-muted border-end-0">
                            <i class="bi bi-person-fill"></i>
                        </span>
                        <input type="text" name="username" class="form-control border-start-0 bg-light" id="id_username" placeholder="Username" required>
                    </div>
                </div>
                
                <div class="mb-4">
                    <label for="id_password" class="form-label fw-semibold">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light text-muted border-end-0">
                            <i class="bi bi-key-fill"></i>
                        </span>
                        <input type="password" name="password" class="form-control border-start-0 bg-light" id="id_password" placeholder="Password" required>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-premium w-100 rounded-pill py-2.5">
                    <i class="bi bi-box-arrow-in-right me-1"></i> Sign In
                </button>
            </form>
            
            <hr class="text-muted my-4">
            <div class="text-center">
                <small class="text-muted">Default admin login: <code>admin</code> / <code>admin123</code></small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
